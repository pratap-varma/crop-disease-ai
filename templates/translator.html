<div id="google_translate_element" class="flex items-center"></div>

<script type="text/javascript">
function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage: "en",
        includedLanguages: "en,hi,te",
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
    }, "google_translate_element");
}

function setActiveButton(langCode) {
    const buttons = {
        en: document.getElementById("btn-en"),
        hi: document.getElementById("btn-hi"),
        te: document.getElementById("btn-te")
    };

    Object.values(buttons).forEach(btn => {
        if (btn) {
            btn.classList.remove("border-green-500", "bg-green-50", "text-green-700", "scale-105");
            btn.classList.add("border-gray-200", "bg-white");
        }
    });

    if (buttons[langCode]) {
        buttons[langCode].classList.remove("border-gray-200", "bg-white");
        buttons[langCode].classList.add("border-green-500", "bg-green-50", "text-green-700", "scale-105");
    }
}

function translatePage(langCode) {
    setActiveButton(langCode);
    localStorage.setItem("selectedLang", langCode);

    document.cookie = "googtrans=/en/" + langCode + "; path=/";
    document.cookie = "googtrans=/en/" + langCode + "; path=/; domain=" + location.hostname;

    setTimeout(function () {
        location.reload();
    }, 500);
}

document.addEventListener("DOMContentLoaded", function () {
    const activeLang = localStorage.getItem("selectedLang") || "en";
    setActiveButton(activeLang);

    const badgeBtn = document.getElementById("profileBadgeBtn");
    const dropdownMenu = document.getElementById("profileDropdownMenu");

    if (badgeBtn && dropdownMenu) {
        badgeBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle("hidden");
        });

        document.addEventListener("click", function (e) {
            if (!dropdownMenu.contains(e.target) && e.target !== badgeBtn) {
                dropdownMenu.classList.add("hidden");
            }
        });
    }
});
</script>

<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
